<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kombi Akıllı Kontrol Paneli</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 20px; color: #f8fafc; display: flex; align-items: center; gap: 10px; }
  
  /* Üst Bilgi Çubuğu */
  .status-bar {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 15px 20px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .status-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: #94a3b8; transition: 0.3s; }
  .dot.online { background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: pulse 2s infinite; }
  .dot.offline { background: #f87171; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

  /* Kart Yapısı */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-bottom: 25px;
  }
  .card {
    background: #1e293b;
    border-radius: 15px;
    padding: 20px;
    border: 1px solid #334155;
    transition: transform 0.2s;
  }
  .card:hover { transform: translateY(-2px); border-color: #475569; }
  .card-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
  .card-value { font-size: 2.2rem; font-weight: 700; line-height: 1; margin-bottom: 5px; }
  .card-unit { font-size: 0.85rem; color: #64748b; }
  
  .val-temp { color: #fb923c; }
  .val-hum { color: #38bdf8; }
  .val-target { color: #a78bfa; }
  .val-on { color: #4ade80; }
  .val-off { color: #f87171; }

  /* Kontrol Panelleri */
  .panel { background: #1e293b; border: 1px solid #334155; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
  .panel h2 { font-size: 1.1rem; margin-bottom: 20px; color: #cbd5e1; border-left: 4px solid #3b82f6; padding-left: 10px; }

  .mode-group { display: flex; gap: 12px; flex-wrap: wrap; }
  .mode-btn {
    flex: 1; min-width: 140px; padding: 15px; border-radius: 12px; border: 2px solid #334155;
    background: #0f172a; color: #94a3b8; cursor: pointer; transition: all 0.3s; font-weight: 600; text-align: center;
  }
  .mode-btn.active.auto { border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
  .mode-btn.active.on { border-color: #fb923c; color: #fb923c; background: rgba(251, 146, 60, 0.1); }
  .mode-btn.active.off { border-color: #64748b; color: #f1f5f9; background: #334155; }

  /* Ayarlar Satırı */
  .setting-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
  input[type=number], input[type=time] {
    background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; padding: 10px; width: 120px; font-size: 1rem;
  }
  input:focus { outline: none; border-color: #3b82f6; }
  .btn-save {
    background: #3b82f6; color: #fff; border: none; border-radius: 8px; padding: 10px 25px;
    cursor: pointer; font-weight: 600; transition: 0.2s;
  }
  .btn-save:hover { background: #2563eb; transform: scale(1.02); }

  /* Log Ekranı */
  .log-container { background: #020617; border-radius: 12px; padding: 15px; height: 180px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; border: 1px solid #1e293b; }
  .log-line { margin-bottom: 5px; color: #64748b; }
  .log-line.info { color: #3b82f6; }
  .log-line.success { color: #4ade80; }
  .log-line.warn { color: #facc15; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .card-value { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div class="container">
  <h1><span>🔥</span> Akıllı Kombi Paneli</h1>

  <div class="status-bar">
    <div class="status-item">
      <div id="mqttDot" class="dot"></div>
      <span id="mqttTxt">MQTT Bağlanıyor...</span>
    </div>
    <div class="status-item">
      <span style="color: #64748b;">Son Güncelleme:</span>
      <span id="lastUpdate">--:--:--</span>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label">ODA SICAKLIĞI</div>
      <div class="card-value val-temp" id="valTemp">--.-</div>
      <div class="card-unit">°C Derece</div>
    </div>
    <div class="card">
      <div class="card-label">HEDEF</div>
      <div class="card-value val-target" id="valTarget">--.-</div>
      <div class="card-unit">°C Ayarlanan</div>
    </div>
    <div class="card">
      <div class="card-label">KOMBİ DURUMU</div>
      <div class="card-value" id="valKombi">--</div>
      <div class="card-unit" id="valKombiAlt">Bekleniyor...</div>
    </div>
    <div class="card">
      <div class="card-label">RÖLE GÜVENLİĞİ</div>
      <div class="card-value" id="valRole">--</div>
      <div class="card-unit" id="valRoleAlt">Sistem Kapalı</div>
    </div>
  </div>

  <div class="panel">
    <h2>🎯 Çalışma Modu Seçimi</h2>
    <div class="mode-group">
      <button class="mode-btn" id="btn_auto" onclick="sendMod('auto')">🤖 OTOMATİK<br><small>PID Kontrol</small></button>
      <button class="mode-btn" id="btn_manual_on" onclick="sendMod('manual_on')">🔥 MANUEL AÇ<br><small>Sürekli Yan</small></button>
      <button class="mode-btn" id="btn_manual_off" onclick="sendMod('manual_off')">❄️ KAPALI<br><small>Sistemi Durdur</small></button>
    </div>
  </div>

  <div class="panel">
    <h2>🌡️ Hedef Sıcaklık Ayarı</h2>
    <div class="setting-row">
      <input type="number" id="inputTarget" value="22.5" step="0.5" min="15" max="30" onfocus="isEditing=true" onblur="isEditing=false">
      <span style="font-size: 1.2rem;">°C</span>
      <button class="btn-save" onclick="sendTarget()">HEDEFİ GÜNCELLE</button>
    </div>
  </div>

  <div style="margin-bottom: 10px; font-size: 0.8rem; font-weight: bold; color: #64748b; padding-left: 5px;">SİSTEM LOGLARI</div>
  <div class="log-container" id="logBox"></div>
</div>

<script>
  // --- AYARLAR ---
  const deviceId = "kombi01"; // ESP'ler ile aynı olmalı
  const mqttBroker = "wss://broker.hivemq.com:8000/mqtt"; // Tarayıcı için WSS şart
  let isEditing = false;

  const client = mqtt.connect(mqttBroker, {
    clientId: "web_panel_" + Math.random().toString(16).substr(2, 8),
    keepalive: 60
  });

  // --- MQTT OLAYLARI ---
  client.on('connect', () => {
    addLog("MQTT Sunucusuna Bağlandı ✅", "success");
    document.getElementById('mqttDot').className = "dot online";
    document.getElementById('mqttTxt').innerText = "Çevrimiçi (Bulut)";
    
    // Abonelikler
    client.subscribe(`${deviceId}/sicaklik`);
    client.subscribe(`${deviceId}/kombi/stat`);
    client.subscribe(`${deviceId}/role/durum`);
    client.subscribe(`${deviceId}/heartbeat`);
  });

  client.on('message', (topic, message) => {
    const msg = message.toString();
    const now = new Date().toLocaleTimeString('tr-TR');
    document.getElementById('lastUpdate').innerText = now;

    if (topic.endsWith('/sicaklik')) {
      const data = JSON.parse(msg);
      document.getElementById('valTemp').innerText = data.t.toFixed(1);
      if(!isEditing) document.getElementById('valTarget').innerText = data.hedef.toFixed(1);
      updateModeUI(data.mod);
    }

    if (topic.endsWith('/kombi/stat')) {
      const isOn = (msg === "1");
      const el = document.getElementById('valKombi');
      el.innerText = isOn ? "AÇIK" : "KAPALI";
      el.className = "card-value " + (isOn ? "val-on" : "val-off");
      document.getElementById('valKombiAlt').innerText = isOn ? "🔥 Isıtma Aktif" : "💤 Beklemede";
    }

    if (topic.endsWith('/role/durum')) {
      const data = JSON.parse(msg);
      const el = document.getElementById('valRole');
      el.innerText = data.role ? "AKTİF" : "PASİF";
      el.className = "card-value " + (data.role ? "val-on" : "val-off");
      document.getElementById('valRoleAlt').innerText = data.guvenli ? "🛡️ Güvenli" : "⚠️ Bağlantı Yok";
    }
  });

  client.on('close', () => {
    document.getElementById('mqttDot').className = "dot offline";
    document.getElementById('mqttTxt').innerText = "Bağlantı Kesildi!";
    addLog("Bağlantı Koptu! Yeniden deneniyor...", "warn");
  });

  // --- FONKSİYONLAR ---
  function sendMod(mod) {
    client.publish(`${deviceId}/kombi/set`, mod, { retain: true });
    addLog("Mod Değiştirildi: " + mod.toUpperCase(), "info");
  }

  function sendTarget() {
    const val = parseFloat(document.getElementById('inputTarget').value);
    const payload = JSON.stringify({ hedef_sic: val });
    client.publish(`${deviceId}/ayarlar`, payload);
    addLog("Yeni Hedef Sıcaklık: " + val + "°C", "info");
  }

  function updateModeUI(currentMod) {
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active', 'auto', 'on', 'off'));
    
    // ESP'den gelen mod numarasına veya ismine göre UI güncelle
    if(currentMod == "0" || currentMod == "auto") document.getElementById('btn_auto').classList.add('active', 'auto');
    if(currentMod == "1" || currentMod == "manual_on") document.getElementById('btn_manual_on').classList.add('active', 'on');
    if(currentMod == "2" || currentMod == "manual_off") document.getElementById('btn_manual_off').classList.add('active', 'off');
  }

  function addLog(msg, type) {
    const box = document.getElementById('logBox');
    const line = document.createElement('div');
    line.className = "log-line " + type;
    line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
    box.prepend(line);
  }
</script>

</body>
</html>
